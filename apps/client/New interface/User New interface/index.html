<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Consilium Design — Recréation d'interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: #fafaf7; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #e5e0d7; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #d2c9bc; }
  /* Switcher */
  .switcher {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 50; background: rgba(45,42,38,.92); backdrop-filter: blur(12px);
    color: #fff; border-radius: 999px; padding: 4px; display: flex; gap: 2px;
    box-shadow: 0 8px 24px rgba(0,0,0,.18);
    font-family: 'Inter', sans-serif;
  }
  .switcher button {
    padding: 6px 14px; font-size: 12px; border-radius: 999px; color: #d8d2c8;
    transition: background .15s, color .15s;
  }
  .switcher button.active { background: #E89376; color: white; font-weight: 500; }
  .switcher button:not(.active):hover { color: white; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="workspace.jsx"></script>
<script type="text/babel">
const App = () => {
  const [screen, setScreen] = React.useState("dashboard");
  return (
    <>
      <div data-screen-label={screen === "dashboard" ? "01 Tableau de bord" : "02 Espace de travail"}>
        {screen === "dashboard" ? <Dashboard /> : <Workspace />}
      </div>
      <div className="switcher">
        <button className={screen === "dashboard" ? "active" : ""} onClick={() => setScreen("dashboard")}>Tableau de bord</button>
        <button className={screen === "workspace" ? "active" : ""} onClick={() => setScreen("workspace")}>Espace de travail</button>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
