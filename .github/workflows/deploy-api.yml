name: Deploy API to Render

on:
  push:
    branches: [master]
    paths:
      - 'apps/SFA-API/**'
  # Permet un redéploiement manuel depuis GitHub → Actions → "Run workflow"
  # (ex: après changement d'env var sur Render qui n'aurait pas auto-redéployé,
  # ou pour rejouer un échec sans nouveau commit).
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is missing. Add it under GitHub → Settings → Secrets and variables → Actions."
            exit 2
          fi
          BODY_FILE=$(mktemp)
          STATUS=$(curl -sS -o "$BODY_FILE" -w "%{http_code}" -X POST "$HOOK_URL" || echo "000")
          echo "Render deploy hook response: $STATUS"
          echo "Render response body:"
          cat "$BODY_FILE" || true
          case "$STATUS" in
            200|201|202)
              echo "Deploy triggered successfully"
              ;;
            *)
              echo "::error::Render deploy hook returned unexpected status $STATUS"
              exit 1
              ;;
          esac
