# Render.com blueprint — one-click deploy of the STUDIO FLYER AI backend.
# Free tier: sleeps after 15 min idle (cold start ~30s). Upgrade to Starter
# ($7/mo) for always-on.
#
# Usage: push the repo to GitHub, then on render.com click "New Blueprint",
# point it at this file, and fill the env vars marked `sync: false` below.

services:
  - type: web
    name: studio-flyer-ai-backend
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # ── Required secrets (fill in the Render dashboard) ─────────────────
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_URL
        sync: false   # set to the deployed frontend URL(s), comma-separated
      # ── Cloudinary ──────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_FOLDER
        value: studio-flyer-ai
      # ── Neon Auth ───────────────────────────────────────────────────────
      - key: NEON_AUTH_ENABLED
        value: "true"
      - key: NEON_AUTH_ISSUER
        sync: false
      - key: NEON_AUTH_JWKS_URL
        sync: false
      - key: NEON_AUTH_AUDIENCE
        value: ""
      # ── AI providers ────────────────────────────────────────────────────
      - key: AI_DEFAULT_TEXT_PROVIDER
        value: mock
      - key: AI_DEFAULT_VISION_PROVIDER
        value: mock
      - key: AI_DEFAULT_TEXT_MODEL
        value: gpt-4o
      - key: AI_DEFAULT_VISION_MODEL
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── Image generation ────────────────────────────────────────────────
      - key: IMAGE_GEN_PROVIDER
        value: mock
      - key: IMAGE_GEN_MODEL
        value: gemini-2.5-flash-image-preview
