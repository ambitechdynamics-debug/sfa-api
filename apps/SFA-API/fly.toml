# Fly.io configuration for the STUDIO FLYER AI backend.
# Usage: `fly launch --no-deploy` (skip), then edit env vars, then `fly deploy`.

app = "studio-flyer-ai-backend"
primary_region = "cdg"          # Paris — closer to Africa/Europe users

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  CLOUDINARY_UPLOAD_FOLDER = "studio-flyer-ai"
  AI_DEFAULT_TEXT_PROVIDER = "mock"
  AI_DEFAULT_VISION_PROVIDER = "mock"
  AI_DEFAULT_TEXT_MODEL = "gpt-4o"
  AI_DEFAULT_VISION_MODEL = "gpt-4o"
  IMAGE_GEN_PROVIDER = "mock"
  IMAGE_GEN_MODEL = "gemini-2.5-flash-image-preview"
  NEON_AUTH_ENABLED = "true"
  NEON_AUTH_AUDIENCE = ""

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"     # scale to zero when idle (free tier friendly)
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
