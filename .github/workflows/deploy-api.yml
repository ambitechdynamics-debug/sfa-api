name: Deploy API to Render

on:
  push:
    branches: [master]
    paths:
      - 'apps/SFA-API/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render deploy hook response: $STATUS"
          [ "$STATUS" = "201" ] && echo "Deploy triggered successfully" || exit 1
